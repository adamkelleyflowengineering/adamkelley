name: Flow Thermal Analysis

# Runs on every push and PR so the thermal check re-evaluates whenever a
# design parameter in config.yaml (or the model itself) changes. This is the
# same signal Flow watches: when the repo changes, the analysis re-runs and
# Flow's analysis agent reviews the result.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  thermal-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fast-charge thermal margin check
        run: python analysis/fast_charge_thermal_check.py

      - name: Upload analysis report
        if: always()  # publish the report even when the design FAILS
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis_report.json
